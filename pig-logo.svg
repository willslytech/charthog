<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
  <title id="title">Pig Headshot Logo</title>
  <desc id="desc">Cartoon pig wearing round glasses and a formal suit, headshot style</desc>
  
  <!-- Suit background / shoulders -->
  <rect x="80" y="280" width="240" height="120" rx="20" fill="#2C3E50"/>
  
  <!-- Suit collar -->
  <polygon points="120,280 160,240 200,255 240,240 280,280" fill="#1F2A38"/>
  
  <!-- Tie -->
  <polygon points="185,255 200,310 215,255" fill="#E74C3C"/>
  <rect x="192" y="255" width="16" height="45" fill="#C0392B"/>
  
  <!-- Pig head -->
  <ellipse cx="200" cy="200" rx="120" ry="115" fill="#FF9F9F"/>
  
  <!-- Ear left -->
  <ellipse cx="95" cy="130" rx="45" ry="55" fill="#FF9F9F" transform="rotate(-35 95 130)"/>
  <!-- Ear right -->
  <ellipse cx="305" cy="130" rx="45" ry="55" fill="#FF9F9F" transform="rotate(35 305 130)"/>
  
  <!-- Inner ears -->
  <ellipse cx="95" cy="130" rx="25" ry="32" fill="#FF7A7A" transform="rotate(-35 95 130)"/>
  <ellipse cx="305" cy="130" rx="25" ry="32" fill="#FF7A7A" transform="rotate(35 305 130)"/>
  
  <!-- Snout -->
  <ellipse cx="200" cy="220" rx="55" ry="42" fill="#FF7A7A"/>
  
  <!-- Nostrils -->
  <ellipse cx="175" cy="215" rx="9" ry="14" fill="#E06C6C"/>
  <ellipse cx="225" cy="215" rx="9" ry="14" fill="#E06C6C"/>
  
  <!-- Mouth / smile -->
  <path d="M155 255 Q200 275 245 255" fill="none" stroke="#E06C6C" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Eyes base -->
  <ellipse cx="145" cy="165" rx="22" ry="28" fill="#2C3E50"/>
  <ellipse cx="255" cy="165" rx="22" ry="28" fill="#2C3E50"/>
  
  <!-- Eye highlights -->
  <ellipse cx="150" cy="158" rx="8" ry="10" fill="#ECF0F1"/>
  <ellipse cx="260" cy="158" rx="8" ry="10" fill="#ECF0F1"/>
  
  <!-- Glasses -->
  <!-- Left lens -->
  <ellipse cx="145" cy="165" rx="32" ry="32" fill="none" stroke="#2C3E50" stroke-width="8"/>
  <!-- Right lens -->
  <ellipse cx="255" cy="165" rx="32" ry="32" fill="none" stroke="#2C3E50" stroke-width="8"/>
  <!-- Bridge -->
  <line x1="177" y1="165" x2="223" y2="165" stroke="#2C3E50" stroke-width="7" stroke-linecap="round"/>
  <!-- Ear arms -->
  <path d="M113 155 Q90 150 75 175" fill="none" stroke="#2C3E50" stroke-width="7" stroke-linecap="round"/>
  <path d="M287 155 Q310 150 325 175" fill="none" stroke="#2C3E50" stroke-width="7" stroke-linecap="round"/>
  
  <!-- Eyebrows (optional stern/business look) -->
  <path d="M120 135 Q145 125 165 135" fill="none" stroke="#2C3E50" stroke-width="9" stroke-linecap="round"/>
  <path d="M235 135 Q255 125 280 135" fill="none" stroke="#2C3E50" stroke-width="9" stroke-linecap="round"/>
</svg>